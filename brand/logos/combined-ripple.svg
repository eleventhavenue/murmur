<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-labelledby="combo-title">
  <title id="combo-title">Murmur Combined Mark — Ripple</title>
  <defs>
    <style>
      .wordmark {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 300;
        font-size: 56px;
        letter-spacing: 0.08em;
        fill: #E8E8EC;
      }
    </style>
  </defs>
  <!-- Icon: ripple mark (compact) -->
  <g transform="translate(20, 8)">
    <circle cx="72" cy="72" r="68" fill="#161618"/>
    <!-- Sound ripple arcs -->
    <path d="M56 44 A40 40 0 0 1 56 100" fill="none" stroke="#C8A87C" stroke-width="8" stroke-linecap="round"/>
    <path d="M72 30 A60 60 0 0 1 72 114" fill="none" stroke="#C8A87C" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <path d="M88 18 A78 78 0 0 1 88 126" fill="none" stroke="#C8A87C" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
    <!-- Origin dot -->
    <circle cx="44" cy="72" r="9" fill="#C8A87C"/>
  </g>
  <!-- Wordmark -->
  <text x="195" y="88" dominant-baseline="central" class="wordmark">murmur</text>
</svg>
